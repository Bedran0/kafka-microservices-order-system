spring.application.name=siparis-servisi

# Kafka'nin adresi - bizim stok-kafka container'imiz 9094 portunda
spring.kafka.bootstrap-servers=localhost:9094

# Uygulama 8081 portunda calissin (Kafka 9092/9094 ile karismasin)
server.port=8081

# Producer: mesaj anahtari String, mesaj icerigi JSON olacak
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer

spring.datasource.url=jdbc:mysql://localhost:3307/siparisdb
spring.datasource.username=root
spring.datasource.password=root123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Consumer ayarlari - inventory-events'i dinleyecek
spring.kafka.consumer.group-id=siparis-servisi-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.siparis_servisi.OrderResult
spring.kafka.consumer.properties.spring.json.use.type.headers=false